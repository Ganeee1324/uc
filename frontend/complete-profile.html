<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniclarity - Completa il tuo Profilo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #2563eb, #1d4ed8);
            --success-gradient: linear-gradient(135deg, #10b981, #059669);
            --accent-color: #2563eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --background-light: #f9fafb;
            --border-color: #e5e7eb;
            --white: #ffffff;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.1);
            --border-radius: 16px;
            --border-radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            max-height: 100vh;
            padding: 0;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.15), transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(17, 24, 39, 0.1), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .logo-top-left {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .logo-top-left img {
            height: 32px;
            width: auto;
        }

        .completion-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .completion-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            width: 100%;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
        }

        .completion-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--secondary-gradient);
        }

        .card-header {
            padding: 15px 40px 8px;
            position: relative;
            text-align: center;
            flex-shrink: 0;
        }


        .logo-container img {
            height: 32px;
            width: auto;
        }


        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .completion-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.2;
            letter-spacing: -0.025em;
        }

        .completion-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.3;
            max-width: 350px;
            margin: 0 auto;
        }

        .card-body {
            padding: 5px 40px 25px;
            flex: 1;
            overflow-y: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f3f4f6;
            border-radius: 4px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--secondary-gradient);
            border-radius: 8px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .form-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            width: 24px;
            height: 24px;
            background: var(--accent-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 16px;
        }

        .banner-profile-container {
            margin-bottom: 16px;
            position: relative;
        }

        .banner-profile-container .banner-preview {
            position: relative;
            margin-bottom: 0;
        }

        .banner-profile-container .profile-avatar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            border: 4px solid var(--white);
            pointer-events: auto;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.025em;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .avatar-upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
            cursor: pointer;
        }

        .profile-avatar:hover .avatar-upload-overlay {
            opacity: 1;
        }

        .banner-preview {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: var(--border-radius);
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
            cursor: pointer;
            transition: var(--transition);
        }

        /* Banner hover effects */
        .banner-preview:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-lg);
        }

        /* Profile avatar prevents banner hover */
        .profile-avatar {
            pointer-events: auto;
            position: relative;
            z-index: 10;
        }

        .profile-avatar:hover {
            z-index: 1002;
        }

        /* Use a more direct approach to prevent banner hover */
        .banner-preview:hover:has(.profile-avatar:hover) {
            transform: none !important;
            box-shadow: none !important;
        }

        .banner-upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0;
            transition: var(--transition);
            color: var(--white);
        }

        .banner-preview:hover .banner-upload-overlay {
            opacity: 1;
        }

        .color-picker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .color-option {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .color-option:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .color-option.selected {
            border-color: var(--white);
            box-shadow: 0 0 0 3px var(--accent-color);
            transform: scale(1.05);
        }

        .color-option::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--white);
            font-weight: 700;
            font-size: 18px;
            opacity: 0;
            transition: var(--transition);
        }

        .color-option.selected::after {
            opacity: 1;
        }

        .color-picker-popup {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            padding: 16px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(10px);
            transition: all 0.3s ease;
            min-width: 280px;
        }

        /* Show banner overlay when banner is hovered (CSS fallback) */
        .banner-preview:hover .color-picker-popup {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* JavaScript-controlled banner hover */
        .banner-preview.banner-hovered .color-picker-popup {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* Hide banner overlay when profile is blocking */
        .banner-preview.profile-blocking-banner .color-picker-popup,
        .banner-preview:has(.profile-avatar:hover) .color-picker-popup,
        .profile-avatar:hover ~ .color-picker-popup {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* Prevent banner transform when profile is blocking */
        .banner-preview.profile-blocking-banner {
            transform: none !important;
            box-shadow: none !important;
        }


        .color-picker-popup .color-picker-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .color-picker-popup .color-option {
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }

        .color-picker-popup h4 {
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
        }


        .avatar-color-picker {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            padding: 12px;
            z-index: 1003;
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(10px);
            transition: all 0.3s ease;
            min-width: 200px;
        }

        /* Show avatar overlay when hovering profile (CSS fallback) */
        .profile-avatar:hover .avatar-color-picker {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* JavaScript-controlled avatar hover */
        .profile-avatar.avatar-hovered .avatar-color-picker {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }




        .avatar-color-picker .color-picker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
        }

        .avatar-color-picker .color-option {
            width: 35px;
            height: 35px;
            border-radius: 8px;
        }

        .avatar-color-picker h4 {
            margin: 0 0 8px 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--border-radius);
            padding: 32px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background: rgba(37, 99, 235, 0.02);
        }

        .upload-area.dragover {
            border-color: var(--accent-color);
            background: rgba(37, 99, 235, 0.05);
            transform: scale(1.02);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            background: var(--background-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: var(--text-secondary);
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            background: var(--white);
            transition: var(--transition);
            color: var(--text-primary);
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .character-count {
            text-align: right;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            flex: 1;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--secondary-gradient);
            color: var(--white);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(37, 99, 235, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(37, 99, 235, 0.02);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .hidden {
            display: none;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--accent-color);
            z-index: 1000;
            transform: translateX(400px);
            transition: var(--transition);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .notification-icon {
            color: var(--accent-color);
            font-size: 20px;
        }

        .notification-text {
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .completion-card {
                border-radius: var(--border-radius);
            }

            .card-header {
                padding: 12px 20px 6px;
                text-align: center;
            }
            
            .completion-container {
                padding: 15px;
            }
            
            .logo-top-left {
                top: 15px;
                left: 15px;
            }
            
            .card-body {
                padding: 6px 20px 16px;
            }

            .completion-title {
                font-size: 18px;
            }

            .completion-subtitle {
                font-size: 12px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .color-picker-grid {
                grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
                gap: 8px;
            }

            .color-option {
                width: 50px;
                height: 50px;
            }

            .banner-profile-container .profile-avatar {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                border: 3px solid var(--white);
            }

            .banner-preview {
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Logo moved outside card -->
    <div class="logo-top-left">
        <img src="images/Logo.png" alt="Uniclarity" onerror="this.style.display='none'">
    </div>
    
    <div class="completion-container">
        <div class="completion-card">
            <div class="card-header">
                <div class="header-center" style="width: 100%; text-align: center;">
                    <h1 class="completion-title">Completa il tuo Profilo</h1>
                    <p class="completion-subtitle">
                        Personalizza il tuo account per un'esperienza unica.
                    </p>
                </div>
            </div>

            <div class="card-body">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <form id="profileForm">
                    <!-- Profile Appearance Section -->
                    <div class="form-section">
                        <h2 class="section-title">
                            <span class="section-icon">
                                <span class="material-symbols-outlined">palette</span>
                            </span>
                            Aspetto del Profilo
                        </h2>

                        <!-- Combined Banner and Profile Container -->
                        <div class="banner-profile-container">
                            <div class="banner-preview" id="bannerPreview">
                                <div class="banner-upload-overlay">
                                    <span class="material-symbols-outlined" style="font-size: 32px;">add_photo_alternate</span>
                                    <span style="font-weight: 500;">Clicca per aggiungere banner</span>
                                </div>
                                <input type="file" id="bannerUpload" class="hidden" accept="image/*">
                                
                                <!-- Banner Color Picker Popup -->
                                <div class="color-picker-popup" id="bannerColorPicker">
                                    <h4>Scegli Colore Banner</h4>
                                    <div class="color-picker-grid" id="bannerColorsPopup">
                                        <!-- Banner colors will be populated by JavaScript -->
                                    </div>
                                </div>
                                
                                <!-- Profile avatar positioned on banner -->
                                <div class="profile-avatar" id="profileAvatar">
                                    <span id="avatarInitials">U</span>
                                    <div class="avatar-upload-overlay">
                                        <span class="material-symbols-outlined">add_a_photo</span>
                                    </div>
                                    <input type="file" id="avatarUpload" class="hidden" accept="image/*">
                                    
                                    <!-- Avatar Color Picker Popup -->
                                    <div class="avatar-color-picker" id="avatarColorPicker">
                                        <h4>Scegli Gradiente</h4>
                                        <div class="color-picker-grid" id="avatarGradientsPopup">
                                            <!-- Avatar gradients will be populated by JavaScript -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>



                    </div>

                    <!-- Personal Information Section -->
                    <div class="form-section">
                        <h2 class="section-title">
                            <span class="section-icon">
                                <span class="material-symbols-outlined">person</span>
                            </span>
                            Informazioni Personali
                        </h2>

                        <div class="form-group">
                            <label for="bio" class="form-label">Bio</label>
                            <textarea 
                                id="bio" 
                                class="form-textarea" 
                                placeholder="Parlaci di te... I tuoi interessi, hobbies, cosa studi..."
                                maxlength="500"
                            ></textarea>
                            <div class="character-count">
                                <span id="bioCount">0</span>/500 caratteri
                            </div>
                        </div>
                    </div>

                    <!-- Academic Information Section -->
                    <div class="form-section">
                        <h2 class="section-title">
                            <span class="section-icon">
                                <span class="material-symbols-outlined">school</span>
                            </span>
                            Informazioni Accademiche
                        </h2>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="course" class="form-label">Corso di Studi</label>
                                <select id="course" class="form-select">
                                    <option value="">Seleziona corso</option>
                                    <option value="informatica">Informatica</option>
                                    <option value="ingegneria">Ingegneria</option>
                                    <option value="medicina">Medicina</option>
                                    <option value="economia">Economia</option>
                                    <option value="giurisprudenza">Giurisprudenza</option>
                                    <option value="psicologia">Psicologia</option>
                                    <option value="lettere">Lettere</option>
                                    <option value="scienze">Scienze</option>
                                    <option value="architettura">Architettura</option>
                                    <option value="altro">Altro</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="canale" class="form-label">Canale</label>
                                <select id="canale" class="form-select">
                                    <option value="">Seleziona canale</option>
                                    <option value="A-K">A-K</option>
                                    <option value="L-Z">L-Z</option>
                                    <option value="A-D">A-D</option>
                                    <option value="E-O">E-O</option>
                                    <option value="P-Z">P-Z</option>
                                    <option value="unico">Canale Unico</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="academicYear" class="form-label">Anno Accademico</label>
                                <select id="academicYear" class="form-select">
                                    <option value="">Seleziona anno</option>
                                    <option value="1">1° Anno</option>
                                    <option value="2">2° Anno</option>
                                    <option value="3">3° Anno</option>
                                    <option value="magistrale-1">1° Anno Magistrale</option>
                                    <option value="magistrale-2">2° Anno Magistrale</option>
                                    <option value="phd">Dottorato</option>
                                    <option value="altro">Altro</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button type="button" class="btn btn-secondary" id="skipBtn">
                            <span class="material-symbols-outlined">skip_next</span>
                            Completa dopo
                        </button>
                        <button type="button" class="btn btn-secondary" id="loginBtn" style="display: none;">
                            <span class="material-symbols-outlined">login</span>
                            Accedi ora
                        </button>
                        <button type="submit" class="btn btn-primary" id="completeBtn">
                            <span class="material-symbols-outlined">check_circle</span>
                            Completa Profilo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">
        <div class="notification-content">
            <span class="material-symbols-outlined notification-icon">info</span>
            <span class="notification-text" id="notificationText"></span>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Avatar gradients
        const avatarGradients = [
            'linear-gradient(135deg, #667eea, #764ba2)',
            'linear-gradient(135deg, #f093fb, #f5576c)',
            'linear-gradient(135deg, #4facfe, #00f2fe)',
            'linear-gradient(135deg, #43e97b, #38f9d7)',
            'linear-gradient(135deg, #fa709a, #fee140)',
            'linear-gradient(135deg, #a8edea, #fed6e3)',
            'linear-gradient(135deg, #ff9a9e, #fecfef)',
            'linear-gradient(135deg, #ffd89b, #19547b)',
            'linear-gradient(135deg, #667eea, #764ba2)',
            'linear-gradient(135deg, #f093fb, #f5576c)',
            'linear-gradient(135deg, #4facfe, #00f2fe)',
            'linear-gradient(135deg, #43e97b, #38f9d7)'
        ];

        // Banner colors  
        const bannerColors = [
            'linear-gradient(135deg, #667eea, #764ba2)',
            'linear-gradient(135deg, #f093fb, #f5576c)',
            'linear-gradient(135deg, #4facfe, #00f2fe)',
            'linear-gradient(135deg, #43e97b, #38f9d7)',
            'linear-gradient(135deg, #fa709a, #fee140)',
            'linear-gradient(135deg, #a8edea, #fed6e3)',
            'linear-gradient(135deg, #ff9a9e, #fecfef)',
            'linear-gradient(135deg, #ffd89b, #19547b)',
            'linear-gradient(135deg, #667eea, #764ba2)',
            'linear-gradient(135deg, #f093fb, #f5576c)',
            'linear-gradient(135deg, #4facfe, #00f2fe)',
            'linear-gradient(135deg, #43e97b, #38f9d7)'
        ];

        // DOM elements
        const profileForm = document.getElementById('profileForm');
        const progressFill = document.getElementById('progressFill');
        const profileAvatar = document.getElementById('profileAvatar');
        const avatarInitials = document.getElementById('avatarInitials');
        const avatarUpload = document.getElementById('avatarUpload');
        const bannerPreview = document.getElementById('bannerPreview');
        const bannerUpload = document.getElementById('bannerUpload');
        const bioTextarea = document.getElementById('bio');
        const bioCount = document.getElementById('bioCount');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notificationText');

        // State
        let selectedAvatarGradient = 0;
        let selectedBannerColor = 0;
        let avatarImageFile = null;
        let bannerImageFile = null;

        // Initialize page
        function init() {
            setupGradientPickers();
            setupEventListeners();
            setRandomDefaults();
            updateProgress();
            checkAuthenticationStatus();
        }

        function checkAuthenticationStatus() {
            const authToken = localStorage.getItem('authToken');
            const skipBtn = document.getElementById('skipBtn');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!authToken) {
                // User is not authenticated, show login button instead of skip
                skipBtn.style.display = 'none';
                loginBtn.style.display = 'flex';
            }
        }

        function setupGradientPickers() {
            const avatarPopupContainer = document.getElementById('avatarGradientsPopup');
            const bannerPopupContainer = document.getElementById('bannerColorsPopup');

            // Clear existing content
            if (avatarPopupContainer) avatarPopupContainer.innerHTML = '';
            if (bannerPopupContainer) bannerPopupContainer.innerHTML = '';

            // Setup avatar gradients in popup
            if (avatarPopupContainer) {
                avatarGradients.forEach((gradient, index) => {
                    const option = document.createElement('div');
                    option.className = 'color-option';
                    option.style.background = gradient;
                    option.addEventListener('click', () => {
                        selectAvatarGradient(index);
                        console.log('Avatar gradient selected:', index);
                    });
                    avatarPopupContainer.appendChild(option);
                });
            }

            // Setup banner colors in popup
            if (bannerPopupContainer) {
                bannerColors.forEach((color, index) => {
                    const option = document.createElement('div');
                    option.className = 'color-option';
                    option.style.background = color;
                    option.addEventListener('click', () => {
                        selectBannerColor(index);
                        console.log('Banner color selected:', index);
                    });
                    bannerPopupContainer.appendChild(option);
                });
            }

            console.log('Gradient pickers setup complete');
        }

        function setupEventListeners() {
            // Avatar upload
            profileAvatar.addEventListener('click', () => avatarUpload.click());
            avatarUpload.addEventListener('change', handleAvatarUpload);

            // Banner upload
            bannerPreview.addEventListener('click', () => bannerUpload.click());
            bannerUpload.addEventListener('change', handleBannerUpload);

            // Bio character count
            bioTextarea.addEventListener('input', updateBioCount);

            // Form submission
            profileForm.addEventListener('submit', handleFormSubmit);
            document.getElementById('skipBtn').addEventListener('click', skipProfileCompletion);
            document.getElementById('loginBtn').addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            // Progress tracking
            const formInputs = profileForm.querySelectorAll('input, select, textarea');
            formInputs.forEach(input => {
                input.addEventListener('change', updateProgress);
                input.addEventListener('input', updateProgress);
            });

            // Hover management for overlays
            setupHoverHandlers();
        }

        function setupHoverHandlers() {
            const bannerElement = document.getElementById('bannerPreview');
            const avatarElement = document.getElementById('profileAvatar');
            const bannerOverlay = document.getElementById('bannerColorPicker');
            const avatarOverlay = document.getElementById('avatarColorPicker');

            console.log('Setting up hover handlers:', {
                banner: !!bannerElement,
                avatar: !!avatarElement,
                bannerOverlay: !!bannerOverlay,
                avatarOverlay: !!avatarOverlay
            });

            if (!bannerElement || !avatarElement) {
                console.error('Required elements not found for hover handlers');
                return;
            }

            // Banner hover handlers
            bannerElement.addEventListener('mouseenter', () => {
                console.log('Banner hovered');
                bannerElement.classList.add('banner-hovered');
            });

            bannerElement.addEventListener('mouseleave', () => {
                console.log('Banner unhovered');
                bannerElement.classList.remove('banner-hovered');
            });

            // Avatar hover handlers
            avatarElement.addEventListener('mouseenter', () => {
                console.log('Avatar hovered');
                avatarElement.classList.add('avatar-hovered');
                bannerElement.classList.add('profile-blocking-banner');
            });

            avatarElement.addEventListener('mouseleave', () => {
                console.log('Avatar unhovered');
                avatarElement.classList.remove('avatar-hovered');
                bannerElement.classList.remove('profile-blocking-banner');
            });
        }

        function setRandomDefaults() {
            selectedAvatarGradient = Math.floor(Math.random() * avatarGradients.length);
            selectedBannerColor = Math.floor(Math.random() * bannerColors.length);
            
            selectAvatarGradient(selectedAvatarGradient);
            selectBannerColor(selectedBannerColor);
        }

        function selectAvatarGradient(index) {
            selectedAvatarGradient = index;
            if (profileAvatar) {
                profileAvatar.style.background = avatarGradients[index];
            }
            
            // Update popup selections
            document.querySelectorAll('#avatarGradientsPopup .color-option').forEach((option, i) => {
                option.classList.toggle('selected', i === index);
            });
        }

        function selectBannerColor(index) {
            selectedBannerColor = index;
            if (!bannerImageFile && bannerPreview) {
                bannerPreview.style.background = bannerColors[index];
            }
            
            // Update popup selections
            document.querySelectorAll('#bannerColorsPopup .color-option').forEach((option, i) => {
                option.classList.toggle('selected', i === index);
            });
        }

        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                showNotification('L\'immagine è troppo grande. Massimo 5MB.');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                avatarImageFile = file;
                profileAvatar.style.backgroundImage = `url(${e.target.result})`;
                profileAvatar.style.backgroundSize = 'cover';
                profileAvatar.style.backgroundPosition = 'center';
                avatarInitials.style.display = 'none';
                updateProgress();
            };
            reader.readAsDataURL(file);
        }

        function handleBannerUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                showNotification('L\'immagine è troppo grande. Massimo 5MB.');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                bannerImageFile = file;
                bannerPreview.style.backgroundImage = `url(${e.target.result})`;
                bannerPreview.style.backgroundSize = 'cover';
                bannerPreview.style.backgroundPosition = 'center';
                updateProgress();
            };
            reader.readAsDataURL(file);
        }

        function updateBioCount() {
            const count = bioTextarea.value.length;
            bioCount.textContent = count;
            
            if (count > 450) {
                bioCount.style.color = '#ef4444';
            } else if (count > 350) {
                bioCount.style.color = '#f59e0b';
            } else {
                bioCount.style.color = 'var(--text-secondary)';
            }
        }

        function updateProgress() {
            const formData = new FormData(profileForm);
            let filledFields = 0;
            let totalFields = 4; // bio, course, canale, academicYear

            // Check text fields
            if (bioTextarea.value.trim()) filledFields++;
            if (document.getElementById('course').value) filledFields++;
            if (document.getElementById('canale').value) filledFields++;
            if (document.getElementById('academicYear').value) filledFields++;

            const progress = (filledFields / totalFields) * 100;
            progressFill.style.width = `${progress}%`;
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            
            const formData = {
                bio: bioTextarea.value.trim(),
                course: document.getElementById('course').value,
                canale: document.getElementById('canale').value,
                academicYear: document.getElementById('academicYear').value,
                avatarGradient: selectedAvatarGradient,
                bannerColor: selectedBannerColor,
                avatarImage: avatarImageFile,
                bannerImage: bannerImageFile
            };

            // Validate minimum required fields
            if (!formData.course || !formData.academicYear) {
                showNotification('Per favore completa almeno il corso di studi e l\'anno accademico.');
                return;
            }

            completeProfile(formData);
        }

        function skipProfileCompletion() {
            if (confirm('Sei sicuro di voler saltare la personalizzazione del profilo? Potrai sempre completarla in seguito.')) {
                // Check if user has auth token, if not redirect to login
                if (localStorage.getItem('authToken')) {
                    window.location.href = 'search.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        }

        async function completeProfile(formData) {
            const completeBtn = document.getElementById('completeBtn');
            const originalText = completeBtn.innerHTML;
            
            completeBtn.disabled = true;
            completeBtn.innerHTML = '<span class="material-symbols-outlined">sync</span> Salvando...';

            try {
                // Here you would normally send the data to your backend
                // For now, we'll simulate the process
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                showNotification('Profilo completato con successo!');
                
                // Redirect to main application or login if not authenticated
                setTimeout(() => {
                    if (localStorage.getItem('authToken')) {
                        window.location.href = 'search.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1500);

            } catch (error) {
                console.error('Error completing profile:', error);
                showNotification('Errore durante il salvataggio. Riprova.');
                completeBtn.disabled = false;
                completeBtn.innerHTML = originalText;
            }
        }

        function showNotification(message) {
            notificationText.textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
